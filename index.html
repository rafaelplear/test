<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratório de Inovação</title>

<style>
:root{
--bg:#f5f7fb;
--card:#ffffff;
--text:#1e293b;
--primary:#2563eb;
--border:#e2e8f0;
--shadow:0 10px 25px rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

body{
background:var(--bg);
color:var(--text);
}

header{
background:white;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:var(--shadow);
position:sticky;
top:0;
}

.logo{
font-size:22px;
font-weight:700;
color:var(--primary);
}

.gear{
font-size:26px;
cursor:pointer;
transition:.3s;
}
.gear:hover{transform:rotate(90deg);}

.container{
padding:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.stat{
background:white;
padding:18px;
border-radius:16px;
box-shadow:var(--shadow);
}

.stat h1{
font-size:30px;
margin-top:10px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:18px;
border-radius:16px;
box-shadow:var(--shadow);
}

h2{
margin-bottom:10px;
color:var(--primary);
}

button{
background:var(--primary);
color:white;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
margin-top:5px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:1px solid var(--border);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:var(--primary);
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:20px;
border-radius:16px;
width:400px;
max-width:95%;
}

.close{
float:right;
cursor:pointer;
font-size:22px;
}

.badge{
background:#16a34a;
color:white;
padding:4px 8px;
border-radius:10px;
font-size:12px;
}
</style>
</head>
<body>

<header>
<div class="logo">📚 Laboratório de Inovação</div>
<div class="gear" onclick="openLogin()">⚙️</div>
</header>

<div class="container">

<!-- STATS -->
<div class="stats">
<div class="stat">
<h3>Chromebooks</h3>
<h1 id="crome">30</h1>
</div>

<div class="stat">
<h3>Tablets</h3>
<h1 id="tablet">50</h1>
</div>

<div class="stat">
<h3>Óculos 3D</h3>
<h1 id="oculos">20</h1>
</div>

<div class="stat">
<h3>Canetas 3D</h3>
<h1 id="caneta">40</h1>
</div>
</div>

<!-- GRID -->
<div class="grid">

<!-- AVISOS -->
<div class="card">
<h2>📢 Avisos</h2>

<input id="avisoTxt" placeholder="Novo aviso">
<button onclick="addAviso()">Adicionar aviso</button>

<ul id="avisos"></ul>
</div>

<!-- RESERVAS -->
<div class="card">
<h2>📋 Reservas</h2>

<input id="prof" placeholder="Professor">
<input id="turma" placeholder="Turma">

<select id="item">
<option>Chromebooks</option>
<option>Tablets</option>
<option>Óculos 3D</option>
<option>Canetas 3D</option>
</select>

<input id="qtd" type="number" placeholder="Quantidade">

<button onclick="addReserva()">Reservar</button>

<table>
<thead>
<tr>
<th>Prof</th>
<th>Turma</th>
<th>Item</th>
<th>Qtd</th>
</tr>
</thead>
<tbody id="reservas"></tbody>
</table>
</div>

</div>
</div>

<!-- LOGIN -->
<div class="modal" id="login">
<div class="box">
<span class="close" onclick="closeLogin()">×</span>
<h3>Área Admin</h3>
<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- ADMIN -->
<div class="modal" id="admin">
<div class="box">
<span class="close" onclick="closeAdmin()">×</span>
<h3>Configuração do Sistema</h3>

<h4>Alterar Quantidades</h4>

<input id="nCrome" type="number" placeholder="Chromebooks">
<input id="nTablet" type="number" placeholder="Tablets">
<input id="nOculos" type="number" placeholder="Óculos 3D">
<input id="nCaneta" type="number" placeholder="Canetas 3D">

<button onclick="salvarItens()">Salvar</button>

<h4 style="margin-top:10px;">Avisos</h4>

<input id="delAviso" placeholder="Remover aviso (texto)">
<button onclick="removerAviso()">Remover</button>

</div>
</div>

<script>

let reservas = JSON.parse(localStorage.getItem("res")) || [];
let avisos = JSON.parse(localStorage.getItem("avisos")) || [];

let estoque = {
crome:30,
tablet:50,
oculos:20,
caneta:40
};

function updateUI(){

document.getElementById("crome").innerText = estoque.crome;
document.getElementById("tablet").innerText = estoque.tablet;
document.getElementById("oculos").innerText = estoque.oculos;
document.getElementById("caneta").innerText = estoque.caneta;

let a="";
avisos.forEach(v=>{
a+=`<li>${v}</li>`;
});
document.getElementById("avisos").innerHTML=a;

let r="";
reservas.forEach(v=>{
r+=`<tr>
<td>${v.prof}</td>
<td>${v.turma}</td>
<td>${v.item}</td>
<td><span class="badge">${v.qtd}</span></td>
</tr>`;
});
document.getElementById("reservas").innerHTML=r;
}

function addAviso(){
let v=document.getElementById("avisoTxt").value;
if(!v) return;
avisos.push(v);
localStorage.setItem("avisos",JSON.stringify(avisos));
document.getElementById("avisoTxt").value="";
updateUI();
}

function removerAviso(){
let v=document.getElementById("delAviso").value;
avisos=avisos.filter(a=>a!==v);
localStorage.setItem("avisos",JSON.stringify(avisos));
updateUI();
}

function addReserva(){
let prof=document.getElementById("prof").value;
let turma=document.getElementById("turma").value;
let item=document.getElementById("item").value;
let qtd=document.getElementById("qtd").value;

if(!prof||!turma||!qtd) return;

reservas.push({prof,turma,item,qtd});
localStorage.setItem("res",JSON.stringify(reservas));

updateUI();
}

function openLogin(){
document.getElementById("login").style.display="flex";
}

function closeLogin(){
document.getElementById("login").style.display="none";
}

function login(){
let s=document.getElementById("senha").value;
if(s==="1212"){
closeLogin();
document.getElementById("admin").style.display="flex";
}else{
alert("Senha errada");
}
}

function closeAdmin(){
document.getElementById("admin").style.display="none";
}

function salvarItens(){
estoque.crome=document.getElementById("nCrome").value||estoque.crome;
estoque.tablet=document.getElementById("nTablet").value||estoque.tablet;
estoque.oculos=document.getElementById("nOculos").value||estoque.oculos;
estoque.caneta=document.getElementById("nCaneta").value||estoque.caneta;
updateUI();
alert("Atualizado!");
}

updateUI();

</script>

</body>
</html>
